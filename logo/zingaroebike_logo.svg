<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0077b6"/>
      <stop offset="100%" style="stop-color:#2d7d46"/>
    </linearGradient>
  </defs>

  <!-- RUOTA stilizzata -->
  <!-- Cerchio esterno -->
  <circle cx="82" cy="90" r="62" fill="none" stroke="url(#grad1)" stroke-width="7"/>
  <!-- Cerchio interno (mozzo) -->
  <circle cx="82" cy="90" r="10" fill="#f4a81d"/>
  <!-- Raggi -->
  <line x1="82" y1="28" x2="82" y2="80" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="82" y1="100" x2="82" y2="152" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="20" y1="90" x2="72" y2="90" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="92" y1="90" x2="144" y2="90" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="38" y1="48" x2="75" y2="84" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="89" y1="96" x2="126" y2="132" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="126" y1="48" x2="89" y2="84" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>
  <line x1="75" y1="96" x2="38" y2="132" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>

  <!-- MANUBRIO stilizzato sopra la ruota -->
  <path d="M 54 34 Q 82 20 110 34" fill="none" stroke="#f4a81d" stroke-width="5" stroke-linecap="round"/>
  <line x1="54" y1="34" x2="47" y2="46" stroke="#f4a81d" stroke-width="5" stroke-linecap="round"/>
  <line x1="110" y1="34" x2="117" y2="46" stroke="#f4a81d" stroke-width="5" stroke-linecap="round"/>

  <!-- TESTO ZINGARO -->
  <text x="165" y="85"
    font-family="'Arial Black', 'Arial Bold', sans-serif"
    font-weight="900"
    font-size="52"
    letter-spacing="1"
    fill="#1a1a2e">ZINGARO</text>

  <!-- TESTO EBIKE -->
  <text x="165" y="138"
    font-family="'Arial Black', 'Arial Bold', sans-serif"
    font-weight="900"
    font-size="52"
    letter-spacing="2"
    fill="url(#grad1)">EBIKE</text>

  <!-- Linea decorativa tra i due testi -->
  <rect x="165" y="95" width="340" height="4" rx="2" fill="#f4a81d"/>

  <!-- Pallino oro accento -->
  <circle cx="500" cy="97" r="6" fill="#f4a81d"/>
</svg>
