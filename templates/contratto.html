<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conferma Prenotazione – ZingaroEbike</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --verde: #2d7d46; --azzurro: #0077b6; --oro: #f4a81d; --scuro: #1a1a2e; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Poppins',sans-serif; background:#f8f9fa; color:#333; min-height:100vh; display:flex; flex-direction:column; }

  nav {
    background:var(--scuro); color:white; padding:14px 40px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .logo { color:white; font-size:1.3rem; font-weight:800; text-decoration:none; }
  .logo span { color:var(--oro); }

  .container { max-width:600px; margin:40px auto; padding:0 20px 60px; flex:1; }

  .header {
    background:linear-gradient(135deg, var(--scuro), var(--verde));
    color:white; border-radius:20px; padding:30px 35px; margin-bottom:25px; text-align:center;
  }
  .header h1 { font-size:1.6rem; font-weight:800; margin-bottom:6px; }
  .header p { opacity:.85; font-size:.9rem; }

  /* RIEPILOGO */
  .riepilogo {
    background:white; border-radius:16px; padding:25px 30px;
    box-shadow:0 3px 20px rgba(0,0,0,.07); margin-bottom:20px;
    border-left:5px solid var(--verde);
  }
  .riepilogo h2 { font-size:1rem; font-weight:700; color:var(--verde); margin-bottom:15px; }
  .dato-row { display:flex; justify-content:space-between; font-size:.88rem; padding:6px 0; border-bottom:1px solid #f0f0f0; }
  .dato-row:last-child { border-bottom:none; }
  .dato-label { color:#777; }
  .dato-val { font-weight:600; color:#333; text-align:right; }
  .dato-totale .dato-label { color:var(--verde); font-weight:700; font-size:1rem; }
  .dato-totale .dato-val { color:var(--verde); font-weight:800; font-size:1.2rem; }

  /* ACCETTAZIONE */
  .accettazione {
    background:white; border-radius:16px; padding:25px 30px;
    box-shadow:0 3px 20px rgba(0,0,0,.07); margin-bottom:20px;
  }
  .accettazione h2 { font-size:1rem; font-weight:700; color:var(--scuro); margin-bottom:18px; }

  .check-row {
    display:flex; align-items:flex-start; gap:14px; padding:14px 16px;
    border:2px solid #e0e0e0; border-radius:12px; margin-bottom:12px;
    cursor:pointer; transition:border-color .2s, background .2s;
    user-select:none;
  }
  .check-row:hover { border-color:var(--verde); background:#f9fffe; }
  .check-row.checked { border-color:var(--verde); background:#f0f9f4; }
  .check-row input[type="checkbox"] {
    width:22px; height:22px; flex-shrink:0; margin-top:2px;
    accent-color:var(--verde); cursor:pointer;
  }
  .check-row span { font-size:.87rem; color:#333; line-height:1.6; }
  .check-row span strong { color:var(--scuro); }

  .btn-paga {
    width:100%; background:var(--verde); color:white; border:none;
    padding:18px; border-radius:15px; font-size:1.1rem; font-weight:800;
    cursor:pointer; font-family:'Poppins',sans-serif; transition:all .3s;
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin-top:5px;
  }
  .btn-paga:hover:not(:disabled) { background:#4caf50; transform:translateY(-2px); }
  .btn-paga:disabled { background:#ccc; cursor:not-allowed; transform:none; }

  .nota { text-align:center; font-size:.75rem; color:#999; margin-top:10px; }

  .btn-back {
    display:inline-flex; align-items:center; gap:6px;
    color:#888; font-size:.85rem; text-decoration:none; margin-bottom:20px;
  }
  .btn-back:hover { color:var(--scuro); }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">Zingaro<span>Ebike</span></a>
  <span style="color:#aaa;font-size:.85rem;">Conferma prenotazione</span>
</nav>

<div class="container">

  <a href="/#prenota" class="btn-back">← Torna al modulo</a>

  <div class="header">
    <h1>📋 Conferma la tua prenotazione</h1>
    <p>Controlla il riepilogo e accetta le condizioni per procedere al pagamento</p>
  </div>

  <!-- RIEPILOGO -->
  <div class="riepilogo">
    <h2>📌 Riepilogo prenotazione</h2>
    <div id="dati-content">
      <div class="dato-row"><span class="dato-label">Caricamento...</span></div>
    </div>
  </div>

  <!-- ACCETTAZIONE -->
  <div class="accettazione">
    <h2>✅ Accettazione</h2>

    <label class="check-row" id="row-condizioni" for="condizioni">
      <input type="checkbox" id="condizioni" onchange="aggiorna()">
      <span>
        <strong>Condizioni di noleggio</strong><br>
        Dichiaro di aver letto e di accettare le condizioni di noleggio: utilizzo responsabile della e-bike, restituzione entro i termini concordati, responsabilità per danni o furto causati da negligenza, politica di cancellazione (rimborso completo oltre 48h, 50% tra 24-48h, nessun rimborso entro 24h).
      </span>
    </label>

    <label class="check-row" id="row-privacy" for="privacy">
      <input type="checkbox" id="privacy" onchange="aggiorna()">
      <span>
        <strong>Privacy (GDPR)</strong><br>
        Acconsento al trattamento dei miei dati personali da parte di Terraferma Cooperativa Sociale esclusivamente per la gestione della prenotazione, ai sensi del Reg. UE 2016/679.
      </span>
    </label>

    <br>
    <button class="btn-paga" id="btn-paga" disabled onclick="procediPagamento()">
      🔒 Accetta e procedi al pagamento
    </button>
    <p class="nota">Pagamento sicuro con carta di credito, PayPal o Google Pay</p>
  </div>

</div>

<script>
const prenotazione = JSON.parse(sessionStorage.getItem('prenotazione_dati') || '{}');

// Mostra riepilogo
const cont = document.getElementById('dati-content');
if (prenotazione.nome) {
  const nomi_bici = { city: '🚲 E-Bike City', mtb: '🚵 E-MTB Trail', gruppo: '👥 Pacchetto Gruppo' };
  const durata_label = prenotazione.durata === 'giornata' ? 'Giornata intera' : 'Mezza giornata';
  cont.innerHTML = `
    <div class="dato-row"><span class="dato-label">Cliente</span><span class="dato-val">${prenotazione.nome} ${prenotazione.cognome}</span></div>
    <div class="dato-row"><span class="dato-label">Email</span><span class="dato-val">${prenotazione.email}</span></div>
    <div class="dato-row"><span class="dato-label">Telefono</span><span class="dato-val">${prenotazione.telefono}</span></div>
    <div class="dato-row"><span class="dato-label">Data</span><span class="dato-val">${prenotazione.data_ritiro} ore ${prenotazione.ora_ritiro}</span></div>
    <div class="dato-row"><span class="dato-label">Bici</span><span class="dato-val">${nomi_bici[prenotazione.tipo_bici] || prenotazione.tipo_bici} × ${prenotazione.num_bici}</span></div>
    <div class="dato-row"><span class="dato-label">Durata</span><span class="dato-val">${durata_label}</span></div>
    <div class="dato-row"><span class="dato-label">Consegna</span><span class="dato-val">${prenotazione.indirizzo_consegna || '—'}</span></div>
    <div class="dato-row dato-totale"><span class="dato-label">Totale</span><span class="dato-val">€${prenotazione.totale_euro || '—'}</span></div>
  `;
} else {
  cont.innerHTML = '<div class="dato-row"><span class="dato-label" style="color:#c00">Nessun dato trovato. <a href="/#prenota">Torna alla prenotazione →</a></span></div>';
}

function aggiorna() {
  const ok = document.getElementById('condizioni').checked && document.getElementById('privacy').checked;
  document.getElementById('btn-paga').disabled = !ok;
  document.getElementById('row-condizioni').classList.toggle('checked', document.getElementById('condizioni').checked);
  document.getElementById('row-privacy').classList.toggle('checked', document.getElementById('privacy').checked);
}

async function procediPagamento() {
  const btn = document.getElementById('btn-paga');
  btn.disabled = true;
  btn.innerHTML = '⏳ Preparazione pagamento...';

  const dati = { ...prenotazione, contratto_accettato: true, privacy_accettata: true };

  try {
    const res = await fetch('/api/prenota', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dati)
    });
    const result = await res.json();
    if (result.success && result.checkout_url) {
      window.location.href = result.checkout_url;
    } else {
      alert('Errore: ' + (result.errore || 'Riprova'));
      btn.disabled = false;
      btn.innerHTML = '🔒 Accetta e procedi al pagamento';
    }
  } catch(e) {
    alert('Errore di connessione. Riprova.');
    btn.disabled = false;
    btn.innerHTML = '🔒 Accetta e procedi al pagamento';
  }
}
</script>
</body>
</html>
